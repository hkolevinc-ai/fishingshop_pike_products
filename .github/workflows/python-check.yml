name: Run scraper

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: |
          python main.py --discover-categories --max-pages 100 --delay 1.2

      - name: Upload CSV result
        uses: actions/upload-artifact@v4
        with:
          name: fishingshop-pike-products-csv
          path: fishingshop_pike_products.csv

      - name: Upload JSONL result
        uses: actions/upload-artifact@v4
        with:
          name: fishingshop-pike-products-jsonl
          path: fishingshop_pike_products.jsonl
